<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Privado Settings</title>
  <style>
    body { max-width: 480px; margin: 40px auto; font-family: system-ui; font-size: 14px; color: #222; }
    h2 { font-size: 18px; margin-bottom: 20px; }
    .section { margin-bottom: 24px; padding: 16px; border: 1px solid #e0e0e0; border-radius: 8px; }
    .section h3 { margin: 0 0 12px; font-size: 14px; color: #555; }
    label { display: block; margin-bottom: 4px; font-weight: 500; }
    select, input[type="password"], input[type="text"] {
      width: 100%; padding: 7px 10px; box-sizing: border-box;
      border: 1px solid #ccc; border-radius: 4px; font-size: 13px; margin-bottom: 12px;
    }
    select:disabled, input:disabled {
      background: #f5f5f5; color: #aaa; cursor: not-allowed;
    }
    .hint { font-size: 11px; color: #888; margin: -8px 0 12px; }
    .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .toggle-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px; padding: 10px 12px;
      background: #f0f6ff; border: 1px solid #c0d8ff; border-radius: 6px;
    }
    .toggle-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
    .toggle-row label { margin: 0; font-weight: 600; font-size: 13px; cursor: pointer; }
    button { padding: 8px 20px; background: #4285f4; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .status { margin-top: 10px; font-size: 12px; color: #0a7d0a; min-height: 16px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <h2 data-i18n="optionsTitle">Privado Settings</h2>

  <div class="section" id="api-section">
    <h3 data-i18n="optionsApiConfig">API Configuration</h3>

    <label for="api-provider" data-i18n="optionsProvider">Provider</label>
    <select id="api-provider">
      <option value="" data-i18n="optionsProviderPlaceholder">— Select —</option>
      <option value="deepl">DeepL</option>
      <option value="openai">OpenAI (GPT)</option>
      <option value="gemini">Google Gemini</option>
      <option value="custom" data-i18n="optionsProviderCustom">Custom (OpenAI-compatible)</option>
    </select>

    <label for="api-key" data-i18n="optionsApiKeyLabel">API Key</label>
    <input type="password" id="api-key" data-i18n-placeholder="optionsApiKeyPlaceholder" placeholder="Paste your API Key" />
    <p class="hint" data-i18n="optionsApiKeyHint">Stored locally only. Never sent to any server.</p>

    <div id="model-row" class="hidden">
      <label for="api-model" data-i18n="optionsModel">Model</label>
      <input type="text" id="api-model" list="model-suggestions" data-i18n-placeholder="optionsModelPlaceholder" placeholder="Choose or enter model name" />
      <datalist id="model-suggestions"></datalist>
    </div>

    <div id="baseurl-row" class="hidden">
      <label for="api-base-url" data-i18n="optionsBaseUrl">Endpoint (Base URL)</label>
      <input type="text" id="api-base-url" />
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="enable-cache">
      <label for="enable-cache" style="margin:0;font-weight:normal" data-i18n="optionsCacheLabel">Enable local cache (results stay on device, saves API quota)</label>
    </div>
  </div>

  <div style="display:flex;gap:8px;align-items:center">
    <button id="save" data-i18n="optionsSave">Save</button>
    <button id="test" style="background:#555" data-i18n="optionsTest">Test Connection</button>
  </div>
  <div class="status" id="status"></div>

  <script src="options.js"></script>
</body>
</html>
