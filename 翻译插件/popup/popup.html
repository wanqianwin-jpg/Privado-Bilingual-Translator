<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 256px;
      font-family: -apple-system, system-ui;
      font-size: 13px;
      background: #f2f2f7;
      color: #1d1d1f;
      padding-bottom: 12px;
    }

    /* ── Header ── */
    .header { padding: 14px 16px 10px; }
    .header h3 { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
    .site {
      font-size: 11px; color: #6e6e73;
      margin-top: 2px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── Card (grouped list) ── */
    .card {
      margin: 0 12px 8px;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
    }

    /* ── Mode rows ── */
    .mode-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      cursor: pointer; background: none; width: 100%; border: none; text-align: left;
      transition: background 0.1s;
    }
    .mode-item + .mode-item { border-top: 0.5px solid rgba(60,60,67,.12); }
    .mode-item:active { background: rgba(0,0,0,.04); }
    .mode-item.selected { background: rgba(0,122,255,.07); }

    .mode-dot {
      width: 16px; height: 16px; border-radius: 50%;
      border: 1.5px solid #c7c7cc; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .mode-item.selected .mode-dot {
      border-color: #007aff; background: #007aff;
    }
    .mode-item.selected .mode-dot::after {
      content: ''; width: 6px; height: 6px;
      border-radius: 50%; background: #fff;
    }

    .mode-text { flex: 1; }
    .mode-name { font-size: 13px; font-weight: 500; line-height: 1.3; }
    .mode-desc { font-size: 11px; color: #6e6e73; margin-top: 1px; }
    .mode-item.selected .mode-desc { color: #3a7bd5; }

    /* ── Privacy sub ── */
    .privacy-sub {
      background: rgba(0,122,255,.04);
      border-top: 0.5px solid rgba(60,60,67,.1);
      padding: 4px 12px 4px 38px;
      display: none;
    }
    .privacy-sub.open { display: block; }
    .sub-option {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 0; cursor: pointer;
    }
    .sub-option:not(:last-child) { border-bottom: 0.5px solid rgba(60,60,67,.1); }
    .sub-dot {
      width: 10px; height: 10px; border-radius: 50%;
      border: 1.5px solid #c7c7cc; flex-shrink: 0;
      transition: all 0.15s;
    }
    .sub-option.selected .sub-dot { background: #007aff; border-color: #007aff; }
    .sub-label { font-size: 12px; color: #3c3c43; flex: 1; }
    .sub-status { font-size: 10px; color: #aeaeb2; white-space: nowrap; }
    .sub-status.ok   { color: #34c759; }
    .sub-status.warn { color: #ff9500; }
    .sub-status.err  { color: #ff3b30; }

    /* ── Apply button ── */
    #apply-btn {
      display: none;
      width: calc(100% - 24px); margin: 0 12px 8px;
      padding: 9px; background: #007aff; color: #fff;
      border: none; border-radius: 10px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: opacity 0.1s;
    }
    #apply-btn.visible { display: block; }
    #apply-btn:active { opacity: 0.85; }

    /* ── API link ── */
    #api-link {
      display: none; font-size: 12px; color: #007aff;
      text-decoration: none; padding: 0 16px 8px;
    }
    #api-link.visible { display: block; }

    /* ── Control rows ── */
    .row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 12px;
    }
    .row:not(:last-child) { border-bottom: 0.5px solid rgba(60,60,67,.12); }
    .row-label { font-size: 13px; }

    select {
      font-size: 12px; padding: 3px 5px;
      border: 0.5px solid rgba(60,60,67,.25);
      border-radius: 6px;
      background: rgba(118,118,128,.12);
      color: inherit;
      max-width: 120px;
    }

    /* ── Toggle ── */
    .switch { position: relative; display: inline-block; width: 36px; height: 22px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider-track {
      position: absolute; inset: 0;
      background: #e5e5ea; border-radius: 22px;
      cursor: pointer; transition: background 0.2s;
    }
    .slider-track::before {
      content: ''; position: absolute;
      width: 18px; height: 18px; left: 2px; top: 2px;
      background: #fff; border-radius: 50%;
      transition: transform 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,.25);
    }
    .switch input:checked + .slider-track { background: #34c759; }
    .switch input:checked + .slider-track::before { transform: translateX(14px); }

    /* ── Dark mode ── */
    @media (prefers-color-scheme: dark) {
      body { background: #1c1c1e; color: #f5f5f7; }
      .site { color: #98989d; }
      .card { background: #2c2c2e; }
      .mode-item + .mode-item,
      .row:not(:last-child),
      .sub-option:not(:last-child),
      .privacy-sub { border-color: rgba(255,255,255,.1); }
      .mode-item.selected { background: rgba(10,132,255,.15); }
      .mode-dot { border-color: #48484a; }
      .mode-item.selected .mode-dot { border-color: #0a84ff; background: #0a84ff; }
      .mode-desc { color: #98989d; }
      .mode-item.selected .mode-desc { color: #5a9fe8; }
      .privacy-sub { background: rgba(10,132,255,.07); }
      .sub-label { color: #aeaeb2; }
      .sub-option.selected .sub-dot { background: #0a84ff; border-color: #0a84ff; }
      select { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.15); }
      .slider-track { background: #3a3a3c; }
      #apply-btn { background: #0a84ff; }
      #api-link { color: #0a84ff; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h3 data-i18n="popupTitle">Privado</h3>
    <div class="site" id="site"></div>
  </div>

  <!-- 模式选择 -->
  <div class="card">
    <button class="mode-item" data-mode="machine">
      <span class="mode-dot"></span>
      <span class="mode-text">
        <span class="mode-name" data-i18n="modeMachine">Machine</span>
        <span class="mode-desc" data-i18n="modeMachineDesc">Free · Cloud</span>
      </span>
    </button>

    <div>
      <button class="mode-item" data-mode-group="privacy">
        <span class="mode-dot"></span>
        <span class="mode-text">
          <span class="mode-name" data-i18n="modePrivacy">Private</span>
          <span class="mode-desc" data-i18n="modePrivacyDesc">Local · Offline</span>
        </span>
      </button>
      <div class="privacy-sub" id="privacy-sub">
        <div class="sub-option" data-sub="chrome-local">
          <span class="sub-dot"></span>
          <span class="sub-label" data-i18n="subLabelChrome">Chrome Local Model</span>
          <span class="sub-status" id="status-chrome" data-i18n="statusDetecting">Detecting</span>
        </div>
        <div class="sub-option" data-sub="apple-npu">
          <span class="sub-dot"></span>
          <span class="sub-label" data-i18n="subLabelApple">Apple NPU</span>
          <span class="sub-status" id="status-apple" data-i18n="statusDetecting">Detecting</span>
        </div>
      </div>
    </div>

    <button class="mode-item" data-mode="api">
      <span class="mode-dot"></span>
      <span class="mode-text">
        <span class="mode-name">API Key</span>
        <span class="mode-desc" data-i18n="modeApiDesc">Custom model</span>
      </span>
    </button>
  </div>

  <button id="apply-btn" data-i18n="applyBtn">Apply &amp; Reload</button>
  <a id="api-link" href="#" data-i18n="apiLink">Set up API Key →</a>

  <!-- 控制项 -->
  <div class="card">
    <div class="row">
      <span id="site-label" data-i18n="translateSiteDefault">Translate this site</span>
      <label class="switch">
        <input type="checkbox" id="site-toggle">
        <span class="slider-track"></span>
      </label>
    </div>
    <div class="row">
      <span data-i18n="targetLangLabel">Translate to</span>
      <select id="target-lang">
        <option value="zh">中文（简体）</option>
        <option value="zh-TW">中文（繁體）</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="es">Español</option>
        <option value="ru">Русский</option>
        <option value="ar">العربية</option>
        <option value="it">Italiano</option>
        <option value="pt-BR">Português (BR)</option>
      </select>
    </div>
    <div class="row">
      <span data-i18n="displayLabel">Display</span>
      <select id="display-mode">
        <option value="bilingual"        data-i18n="displayBilingual">Bilingual</option>
        <option value="translation-only" data-i18n="displayTransOnly">Translation only</option>
        <option value="original-only"    data-i18n="displayOrigOnly">Original only</option>
      </select>
    </div>
  </div>

  <script src="chrome-shim.js"></script>
  <script src="popup.js"></script>
</body>
</html>
