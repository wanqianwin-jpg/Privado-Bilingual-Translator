<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 240px; padding: 12px; font-family: system-ui; font-size: 13px; margin: 0; color: #222; }
    h3 { margin: 0 0 10px; font-size: 14px; font-weight: 600; }
    .site { color: #888; font-size: 11px; margin-bottom: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    hr { border: none; border-top: 1px solid #eee; margin: 10px 0; }
    .row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
    select { font-size: 12px; padding: 3px 6px; border: 1px solid #ccc; border-radius: 3px; }

    /* 三选一分段控件 */
    .mode-tabs { display: flex; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; margin-bottom: 10px; }
    .mode-tab { flex: 1; text-align: center; padding: 6px 2px; font-size: 11px; cursor: pointer; color: #555; background: #fff; border: none; transition: background 0.15s, color 0.15s; line-height: 1.2; }
    .mode-tab:not(:last-child) { border-right: 1px solid #ddd; }
    .mode-tab.active { background: #4285f4; color: #fff; font-weight: 600; }

    /* 隐私翻译检测面板 */
    #privacy-panel { margin-bottom: 8px; }
    .detect-row { display: flex; align-items: center; gap: 8px; }
    #detect-btn { font-size: 11px; padding: 3px 8px; border: 1px solid #4285f4; color: #4285f4; background: #fff; border-radius: 3px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    #detect-btn:hover { background: #e8f0fe; }
    #detect-status { font-size: 11px; color: #888; flex: 1; min-width: 0; }

    /* API Key 面板 */
    #api-panel { margin-bottom: 8px; }
    #api-panel a { font-size: 11px; color: #4285f4; text-decoration: none; }

    /* Toggle */
    .switch { position: relative; display: inline-block; width: 34px; height: 20px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider-track { position: absolute; inset: 0; background: #ccc; border-radius: 20px; cursor: pointer; transition: background 0.2s; }
    .slider-track::before { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
    .switch input:checked + .slider-track { background: #4285f4; }
    .switch input:checked + .slider-track::before { transform: translateX(14px); }
  </style>
</head>
<body>
  <h3>双语翻译</h3>
  <div class="site" id="site"></div>

  <div class="mode-tabs">
    <button class="mode-tab" data-mode="machine">机翻</button>
    <button class="mode-tab" data-mode="privacy">隐私翻译</button>
    <button class="mode-tab" data-mode="api">API Key</button>
  </div>

  <div id="privacy-panel" style="display:none">
    <div class="detect-row">
      <button id="detect-btn">检测可用性</button>
      <span id="detect-status">点击检测本地翻译引擎</span>
    </div>
  </div>

  <div id="api-panel" style="display:none">
    <a id="options-link" href="#">设置 API Key →</a>
  </div>

  <hr>

  <div class="row">
    <span>翻译此网站</span>
    <label class="switch">
      <input type="checkbox" id="site-toggle">
      <span class="slider-track"></span>
    </label>
  </div>

  <div class="row">
    <span>翻译为</span>
    <select id="target-lang">
      <option value="zh">中文（简体）</option>
      <option value="zh-TW">中文（繁體）</option>
      <option value="en">English</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
      <option value="es">Español</option>
      <option value="ru">Русский</option>
      <option value="ar">العربية</option>
      <option value="it">Italiano</option>
      <option value="pt-BR">Português (BR)</option>
    </select>
  </div>

  <div class="row">
    <span>显示</span>
    <select id="display-mode">
      <option value="bilingual">双语</option>
      <option value="translation-only">仅译文</option>
      <option value="original-only">仅原文</option>
    </select>
  </div>

  <script src="popup.js"></script>
</body>
</html>
