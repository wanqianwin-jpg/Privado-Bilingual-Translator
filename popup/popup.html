<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body { width: 240px; padding: 12px; font-family: system-ui; font-size: 13px; margin: 0; color: #222; }
    h3 { margin: 0 0 4px; font-size: 14px; font-weight: 600; }
    .site { color: #888; font-size: 11px; margin-bottom: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    hr { border: none; border-top: 1px solid #eee; margin: 10px 0; }
    .row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
    select { font-size: 12px; padding: 3px 6px; border: 1px solid #ccc; border-radius: 3px; background: #fff; }

    /* 模式卡片列表 */
    .mode-list { border: 1px solid #ddd; border-radius: 7px; overflow: hidden; margin-bottom: 8px; }
    .mode-item { display: flex; align-items: center; gap: 10px; padding: 9px 11px; cursor: pointer; background: #fff; width: 100%; border: none; text-align: left; transition: background 0.1s; }
    .mode-item:not(:last-child) { border-bottom: 1px solid #eee; }
    .mode-item:hover { background: #f7f7f7; }
    .mode-item.selected { background: #eef3ff; }
    .mode-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #ccc; flex-shrink: 0; transition: border-color 0.15s; }
    .mode-item.selected .mode-dot { border-color: #4285f4; background: #4285f4; box-shadow: inset 0 0 0 2.5px #fff; }
    .mode-text { flex: 1; }
    .mode-name { font-size: 12px; font-weight: 500; line-height: 1.3; }
    .mode-desc { font-size: 10px; color: #999; margin-top: 1px; }
    .mode-item.selected .mode-desc { color: #5a82d4; }

    /* 隐私翻译子选项 */
    .privacy-sub { background: #f4f7ff; border-top: 1px solid #dde6ff; padding: 6px 11px 6px 35px; display: none; }
    .privacy-sub.open { display: block; }
    .sub-option { display: flex; align-items: center; gap: 8px; padding: 4px 0; cursor: pointer; }
    .sub-dot { width: 11px; height: 11px; border-radius: 50%; border: 1.5px solid #aaa; flex-shrink: 0; }
    .sub-option.selected .sub-dot { border-color: #4285f4; background: #4285f4; box-shadow: inset 0 0 0 2px #fff; }
    .sub-label { font-size: 11px; color: #444; flex: 1; }
    .sub-status { font-size: 10px; color: #bbb; white-space: nowrap; }
    .sub-status.ok { color: #0a7d0a; }
    .sub-status.warn { color: #e08000; }
    .sub-status.err { color: #c00; }

    /* 应用按钮 */
    #apply-btn { display: none; width: 100%; padding: 7px; background: #4285f4; color: #fff; border: none; border-radius: 5px; font-size: 12px; font-weight: 500; cursor: pointer; margin-bottom: 8px; }
    #apply-btn.visible { display: block; }
    #apply-btn:hover { background: #3070d8; }

    /* API Key 链接 */
    #api-link { display: none; font-size: 11px; color: #4285f4; text-decoration: none; margin-bottom: 8px; }
    #api-link.visible { display: block; }

    /* Toggle */
    .switch { position: relative; display: inline-block; width: 34px; height: 20px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider-track { position: absolute; inset: 0; background: #ccc; border-radius: 20px; cursor: pointer; transition: background 0.2s; }
    .slider-track::before { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
    .switch input:checked + .slider-track { background: #4285f4; }
    .switch input:checked + .slider-track::before { transform: translateX(14px); }
  </style>
</head>
<body>
  <h3 data-i18n="popupTitle">Privado</h3>
  <div class="site" id="site"></div>

  <!-- 模式选择 -->
  <div class="mode-list">
    <button class="mode-item" data-mode="machine">
      <span class="mode-dot"></span>
      <span class="mode-text">
        <span class="mode-name" data-i18n="modeMachine">Machine</span>
        <span class="mode-desc" data-i18n="modeMachineDesc">Free · Cloud</span>
      </span>
    </button>

    <div>
      <button class="mode-item" data-mode-group="privacy">
        <span class="mode-dot"></span>
        <span class="mode-text">
          <span class="mode-name" data-i18n="modePrivacy">Private</span>
          <span class="mode-desc" data-i18n="modePrivacyDesc">Local · Offline</span>
        </span>
      </button>
      <div class="privacy-sub" id="privacy-sub">
        <div class="sub-option" data-sub="chrome-local">
          <span class="sub-dot"></span>
          <span class="sub-label" data-i18n="subLabelChrome">Chrome Local Model</span>
          <span class="sub-status" id="status-chrome" data-i18n="statusDetecting">Detecting</span>
        </div>

      </div>
    </div>

    <button class="mode-item" data-mode="api">
      <span class="mode-dot"></span>
      <span class="mode-text">
        <span class="mode-name">API Key</span>
        <span class="mode-desc" data-i18n="modeApiDesc">Custom model</span>
      </span>
    </button>
  </div>

  <button id="apply-btn" data-i18n="applyBtn">Apply &amp; Reload</button>
  <a id="api-link" href="#" data-i18n="apiLink">Set up API Key →</a>

  <hr>

  <div class="row">
    <span id="site-label" data-i18n="translateSiteDefault">Translate this site</span>
    <label class="switch">
      <input type="checkbox" id="site-toggle">
      <span class="slider-track"></span>
    </label>
  </div>

  <div class="row">
    <span data-i18n="targetLangLabel">Translate to</span>
    <select id="target-lang">
      <option value="zh">中文（简体）</option>
      <option value="zh-TW">中文（繁體）</option>
      <option value="en">English</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
      <option value="es">Español</option>
      <option value="ru">Русский</option>
      <option value="ar">العربية</option>
      <option value="it">Italiano</option>
      <option value="pt-BR">Português (BR)</option>
    </select>
  </div>

  <div class="row">
    <span data-i18n="displayLabel">Display</span>
    <select id="display-mode">
      <option value="bilingual"        data-i18n="displayBilingual">Bilingual</option>
      <option value="translation-only" data-i18n="displayTransOnly">Translation only</option>
      <option value="original-only"    data-i18n="displayOrigOnly">Original only</option>
    </select>
  </div>

  <script src="popup.js"></script>
</body>
</html>
