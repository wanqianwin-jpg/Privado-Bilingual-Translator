<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 220px; padding: 12px; font-family: system-ui; font-size: 13px; margin: 0; color: #222; }
    h3 { margin: 0 0 12px; font-size: 14px; font-weight: 600; }
    .row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
    select { font-size: 12px; padding: 3px 6px; border: 1px solid #ccc; border-radius: 3px; }
    .site { color: #888; font-size: 11px; margin-bottom: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    hr { border: none; border-top: 1px solid #eee; margin: 10px 0; }
    a { font-size: 11px; color: #4285f4; text-decoration: none; display: block; margin-top: 8px; }

    /* API toggle row */
    .api-row { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
    .api-label { font-size: 12px; color: #555; flex-shrink: 0; }
    .switch { position: relative; display: inline-block; width: 34px; height: 20px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider-track {
      position: absolute; inset: 0; background: #ccc; border-radius: 20px; cursor: pointer;
      transition: background 0.2s;
    }
    .slider-track::before {
      content: ''; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px;
      background: #fff; border-radius: 50%; transition: transform 0.2s;
    }
    .switch input:checked + .slider-track { background: #4285f4; }
    .switch input:checked + .slider-track::before { transform: translateX(14px); }
    #api-model-display { font-size: 11px; color: #4285f4; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
  <h3>双语翻译</h3>
  <div class="site" id="site"></div>

  <div class="api-row">
    <span class="api-label">付费 API</span>
    <label class="switch">
      <input type="checkbox" id="api-toggle">
      <span class="slider-track"></span>
    </label>
    <span id="api-model-display"></span>
  </div>

  <hr>

  <div class="row">
    <span>翻译此网站</span>
    <label class="switch">
      <input type="checkbox" id="site-toggle">
      <span class="slider-track"></span>
    </label>
  </div>

  <div class="row">
    <span>翻译为</span>
    <select id="target-lang">
      <option value="zh">中文（简体）</option>
      <option value="zh-TW">中文（繁體）</option>
      <option value="en">English</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
      <option value="es">Español</option>
      <option value="ru">Русский</option>
      <option value="ar">العربية</option>
      <option value="it">Italiano</option>
      <option value="pt-BR">Português (BR)</option>
    </select>
  </div>

  <div class="row">
    <span>显示</span>
    <select id="display-mode">
      <option value="bilingual">双语</option>
      <option value="translation-only">仅译文</option>
      <option value="original-only">仅原文</option>
    </select>
  </div>

  <a id="options-link" href="#">设置 API Key →</a>
  <script src="popup.js"></script>
</body>
</html>
